# dexpose default pattern set
# Format: gitleaks-compatible rules.toml
# Phase 8 will extend this file. Do not remove existing rules without updating
# the smoke tests in internal/pattern/pattern_test.go.

# ── AWS ──────────────────────────────────────────────────────────────────────

[[rules]]
id          = "aws-access-key"
description = "AWS IAM access key ID"
regex       = '''AKIA[0-9A-Z]{16}'''

[[rules]]
id          = "aws-secret-access-key"
description = "AWS IAM secret access key (heuristic: 40-char base64 following common assignment patterns)"
regex       = '''(?i)aws[_\-\.]?secret[_\-\.]?(?:access[_\-\.]?)?key["']?\s*[=:]\s*["']?([A-Za-z0-9/+=]{40})'''

[[rules]]
id          = "aws-session-token"
description = "AWS temporary session token"
regex       = '''(?i)aws[_\-\.]?session[_\-\.]?token["']?\s*[=:]\s*["']?([A-Za-z0-9/+=]{100,})'''

# ── Stripe ───────────────────────────────────────────────────────────────────

[[rules]]
id          = "stripe-secret-key"
description = "Stripe secret API key (live)"
regex       = '''sk_live_[0-9a-zA-Z]{24,}'''

[[rules]]
id          = "stripe-restricted-key"
description = "Stripe restricted API key (live)"
regex       = '''rk_live_[0-9a-zA-Z]{24,}'''

[[rules]]
id          = "stripe-publishable-key"
description = "Stripe publishable key (live) — low severity but confirms Stripe usage"
regex       = '''pk_live_[0-9a-zA-Z]{24,}'''

[[rules]]
id          = "stripe-webhook-secret"
description = "Stripe webhook signing secret"
regex       = '''whsec_[0-9a-zA-Z]{32,}'''

# ── Slack ─────────────────────────────────────────────────────────────────────

[[rules]]
id          = "slack-bot-token"
description = "Slack bot user OAuth token"
regex       = '''xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}'''

[[rules]]
id          = "slack-user-token"
description = "Slack user OAuth token"
regex       = '''xoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{32}'''

[[rules]]
id          = "slack-app-token"
description = "Slack app-level token"
regex       = '''xapp-[0-9]-[A-Z0-9]{10,13}-[0-9]{13}-[a-zA-Z0-9]{64}'''

[[rules]]
id          = "slack-webhook-url"
description = "Slack incoming webhook URL"
regex       = '''https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+'''

# ── Twilio ───────────────────────────────────────────────────────────────────

[[rules]]
id          = "twilio-account-sid"
description = "Twilio account SID"
regex       = '''AC[a-z0-9]{32}'''

[[rules]]
id          = "twilio-auth-token"
description = "Twilio auth token (heuristic: 32-char hex following common assignment)"
regex       = '''(?i)twilio[_\-\.]?auth[_\-\.]?token["']?\s*[=:]\s*["']?([a-f0-9]{32})'''

# ── SendGrid ─────────────────────────────────────────────────────────────────

[[rules]]
id          = "sendgrid-api-key"
description = "SendGrid API key"
regex       = '''SG\.[0-9A-Za-z\-_]{22}\.[0-9A-Za-z\-_]{43}'''

# ── Mailgun ──────────────────────────────────────────────────────────────────

[[rules]]
id          = "mailgun-api-key"
description = "Mailgun private API key"
regex       = '''key-[0-9a-zA-Z]{32}'''

[[rules]]
id          = "mailgun-webhook-key"
description = "Mailgun webhook signing key (same format, different assignment context)"
regex       = '''(?i)mailgun[_\-\.]?(?:webhook[_\-\.]?)?(?:signing[_\-\.]?)?key["']?\s*[=:]\s*["']?([a-zA-Z0-9\-]{32,})'''

# ── Google ───────────────────────────────────────────────────────────────────

[[rules]]
id          = "google-api-key"
description = "Google API key"
regex       = '''AIza[0-9A-Za-z\-_]{35}'''

[[rules]]
id          = "google-oauth-client-secret"
description = "Google OAuth 2.0 client secret"
regex       = '''GOCSPX-[0-9A-Za-z\-_]{28}'''

[[rules]]
id          = "google-service-account-key"
description = "Google service account private key PEM block"
regex       = '''-----BEGIN (RSA )?PRIVATE KEY-----[A-Za-z0-9+/=\n]+-----END (RSA )?PRIVATE KEY-----'''

[[rules]]
id          = "firebase-server-key"
description = "Firebase Cloud Messaging server key"
regex       = '''AAAA[A-Za-z0-9_-]{7}:[A-Za-z0-9_-]{140}'''

# ── GitHub ───────────────────────────────────────────────────────────────────

[[rules]]
id          = "github-personal-access-token"
description = "GitHub personal access token (classic)"
regex       = '''ghp_[0-9a-zA-Z]{36}'''

[[rules]]
id          = "github-oauth-access-token"
description = "GitHub OAuth access token"
regex       = '''gho_[0-9a-zA-Z]{36}'''

[[rules]]
id          = "github-app-token"
description = "GitHub App installation or user-to-server token"
regex       = '''(ghu|ghs)_[0-9a-zA-Z]{36}'''

[[rules]]
id          = "github-refresh-token"
description = "GitHub OAuth refresh token"
regex       = '''ghr_[0-9a-zA-Z]{76}'''

# ── Generic private keys ──────────────────────────────────────────────────────

[[rules]]
id          = "private-key-pem"
description = "PEM-encoded private key block"
regex       = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY(?: BLOCK)?-----[A-Za-z0-9+/=\n]+-----END (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY(?: BLOCK)?-----'''

# ── Generic high-value assignment patterns ────────────────────────────────────
# These are intentionally broad; false positive rate is acceptable for the
# bug bounty / CI use case where over-reporting is preferable to under-reporting.

[[rules]]
id          = "generic-api-key"
description = "Generic API key assignment pattern"
regex       = '''(?i)api[_\-\.]?key["']?\s*[=:]\s*["']([0-9a-zA-Z\-_]{20,})["']'''

[[rules]]
id          = "generic-secret"
description = "Generic secret or password assignment pattern"
regex       = '''(?i)(?:secret|password|passwd|pwd)["']?\s*[=:]\s*["']([^"'\s]{8,})["']'''

[[rules]]
id          = "generic-token"
description = "Generic token assignment pattern"
regex       = '''(?i)(?:auth[_\-]?)?token["']?\s*[=:]\s*["']([0-9a-zA-Z\-_.]{20,})["']'''

[[rules]]
id          = "bearer-token"
description = "HTTP Bearer token in a string literal"
regex       = '''(?i)Bearer\s+([0-9a-zA-Z\-_.]{20,})'''

# ── Heroku ─────────────────────────────────────────────────────────────────

[[rules]]
id          = "heroku-api-key"
description = "Heroku API key"
regex       = '''(?i)heroku[_\-\.]?api[_\-\.]?key["']?\s*[=:]\s*["']([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})["']'''

# ── DigitalOcean ───────────────────────────────────────────────────────────

[[rules]]
id          = "digitalocean-personal-access-token"
description = "DigitalOcean personal access token"
regex       = '''dop_v1_[0-9a-f]{64}'''

[[rules]]
id          = "digitalocean-oauth-token"
description = "DigitalOcean OAuth access token"
regex       = '''doo_v1_[0-9a-f]{64}'''

[[rules]]
id          = "digitalocean-access-token"
description = "DigitalOcean legacy access token"
regex       = '''(?i)digitalocean[_\-\.]?(?:access[_\-\.]?)?token["']?\s*[=:]\s*["']([0-9a-f]{64})["']'''

# ── Datadog ────────────────────────────────────────────────────────────────

[[rules]]
id          = "datadog-api-key"
description = "Datadog API key"
regex       = '''(?i)datadog[_\-\.]?api[_\-\.]?key["']?\s*[=:]\s*["']([0-9a-f]{32})["']'''

[[rules]]
id          = "datadog-application-key"
description = "Datadog application key"
regex       = '''(?i)datadog[_\-\.]?(?:application|app)[\-_\.]?key["']?\s*[=:]\s*["']([0-9a-f]{40})["']'''

# ── New Relic ──────────────────────────────────────────────────────────────

[[rules]]
id          = "newrelic-api-key"
description = "New Relic Insights API key"
regex       = '''NRAK-[A-Z0-9]{27}'''

[[rules]]
id          = "newrelic-ingest-key"
description = "New Relic ingest license key"
regex       = '''(?i)new[_\-]?relic[_\-\.]?(?:license|ingest)[\-_\.]?key["']?\s*[=:]\s*["']([0-9a-f]{32})["']'''

# ── PagerDuty ──────────────────────────────────────────────────────────────

[[rules]]
id          = "pagerduty-api-key"
description = "PagerDuty API key"
regex       = '''(?i)pagerduty[_\-\.]?api[_\-\.]?key["']?\s*[=:]\s*["']([0-9a-zA-Z]{20})["']'''

# ── npm ────────────────────────────────────────────────────────────────────

[[rules]]
id          = "npm-access-token"
description = "npm access token"
regex       = '''npm_[A-Za-z0-9]{36}'''

# ── PyPI ───────────────────────────────────────────────────────────────────

[[rules]]
id          = "pypi-api-token"
description = "PyPI API token"
regex       = '''pypi-[A-Za-z0-9\-_]{100,}'''

# ── Confluent ──────────────────────────────────────────────────────────────

[[rules]]
id          = "confluent-api-key"
description = "Confluent Cloud API key"
regex       = '''(?i)confluent[_\-\.]?api[_\-\.]?key["']?\s*[=:]\s*["']([a-z0-9]{16})["']'''

[[rules]]
id          = "confluent-api-secret"
description = "Confluent Cloud API secret"
regex       = '''(?i)confluent[_\-\.]?api[_\-\.]?(?:secret|password)["']?\s*[=:]\s*["']([A-Za-z0-9+/]{40})["']'''

# ── Doppler ────────────────────────────────────────────────────────────────

[[rules]]
id          = "doppler-token"
description = "Doppler service token"
regex       = '''dp\.st\.[a-z0-9\-_]{40,}'''

[[rules]]
id          = "doppler-personal-token"
description = "Doppler personal token"
regex       = '''dp\.pt\.[a-z0-9\-_]{40,}'''

# ── Terraform Cloud ────────────────────────────────────────────────────────

[[rules]]
id          = "terraform-cloud-token"
description = "Terraform Cloud / Enterprise API token"
regex       = '''(?i)atlasv1\.[A-Za-z0-9\-_]{14,}'''

# ── HashiCorp Vault ────────────────────────────────────────────────────────

[[rules]]
id          = "vault-token"
description = "HashiCorp Vault service token"
regex       = '''(?i)vault[_\-\.]?token["']?\s*[=:]\s*["']?hvs\.[A-Za-z0-9\-_]{24,}'''

[[rules]]
id          = "vault-batch-token"
description = "HashiCorp Vault batch token"
regex       = '''(?i)vault[_\-\.]?token["']?\s*[=:]\s*["']?hvb\.[A-Za-z0-9\-_]{24,}'''

# ── Azure ──────────────────────────────────────────────────────────────────

[[rules]]
id          = "azure-storage-account-key"
description = "Azure Storage account key"
regex       = '''(?i)(?:account[_\-\.]?key|storage[_\-\.]?key)["']?\s*[=:]\s*["']?([A-Za-z0-9+/]{86}==)'''

[[rules]]
id          = "azure-client-secret"
description = "Azure AD client secret"
regex       = '''(?i)(?:client[_\-\.]?secret|azure[_\-\.]?secret)["']?\s*[=:]\s*["']([A-Za-z0-9\-_.~+/]{34,})["']'''

# ── Shopify ────────────────────────────────────────────────────────────────

[[rules]]
id          = "shopify-access-token"
description = "Shopify Admin API access token (shpat_ / shpca_ / shppa_ / shpbs_ / shpss_)"
regex       = '''shp(at|ca|pa|bs|ss)_[a-fA-F0-9]{32,}'''

[[rules]]
id          = "shopify-shared-secret"
description = "Shopify API shared secret"
regex       = '''(?i)shopify[_\-\.]?(?:api[_\-\.]?)?shared[_\-\.]?secret["']?\s*[=:]\s*["']([a-f0-9]{32})["']'''

# ── Twitch ─────────────────────────────────────────────────────────────────

[[rules]]
id          = "twitch-client-secret"
description = "Twitch API client secret"
regex       = '''(?i)twitch[_\-\.]?(?:api[_\-\.]?)?client[_\-\.]?secret["']?\s*[=:]\s*["']([0-9a-zA-Z]{30})["']'''

# ── Database connection strings ─────────────────────────────────────────────

[[rules]]
id          = "connection-string-password"
description = "Database or service connection string with embedded password"
regex       = '''(?i)(?:mysql|postgres(?:ql)?|mongodb(?:\+srv)?|redis|amqp|mssql)://[^:\s]+:([^@\s]{8,})@[^\s]+'''

[[rules]]
id          = "database-url-password"
description = "DATABASE_URL or similar with embedded password"
regex       = '''(?i)database[_\-\.]?url["']?\s*[=:]\s*["']?[a-z]+://[^:\s]+:([^@\s]{8,})@[^\s]+'''

# ── Google OAuth client IDs ────────────────────────────────────────────────

[[rules]]
id          = "google-oauth-client-id"
description = "Google OAuth 2.0 client ID (Android web client)"
regex       = '''[0-9]{10,}-[a-zA-Z0-9_]+\.apps\.googleusercontent\.com'''

# ── Firebase ──────────────────────────────────────────────────────────────

[[rules]]
id          = "firebase-url"
description = "Firebase Realtime Database URL"
regex       = '''[a-zA-Z0-9_-]+\.firebaseio\.com'''

# ── JSON Web Tokens ──────────────────────────────────────────────────────

[[rules]]
id          = "jwt-token"
description = "JSON Web Token (JWT)"
regex       = '''eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'''

